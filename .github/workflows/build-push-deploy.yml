name: Build & Push & Deploy

on:
  push:
    branches: [main]
    tags:
      - "v*.*.*"
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ vars.IMAGE_NAME }}
  TAPIS_ISSUER: ${{ vars.TAPIS_ISSUER }}
  TAPIS_JWKS_URL: ${{ vars.TAPIS_JWKS_URL }}
  TAPIS_TENANT_ID: ${{ vars.TAPIS_TENANT_ID }}

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: pip install --upgrade uv

      - name: Install project + test extras
        run: uv pip install --system -e ".[test]"

      - name: Run pytest
        run: pytest -v --tb=short

  build-and-push-images:
    runs-on: ubuntu-latest
    needs: [test]
    if: github.event_name != 'pull_request'
    # Native linux/amd64 on ubuntu-latest (same pattern as other ICICLE GHCR workflows: no platforms:).
    timeout-minutes: 35

    permissions:
      contents: write   # required by softprops/action-gh-release to create Releases
      packages: write

    outputs:
      version_tag: ${{ steps.tags.outputs.version_tag }}
      image_tags: ${{ steps.tags.outputs.image_tags }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Compute Docker tags
        id: tags
        shell: bash
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"

          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"

            echo "version_tag=${VERSION}" >> "$GITHUB_OUTPUT"

            {
              echo "image_tags<<EOF"
              echo "${IMAGE}:latest"
              echo "${IMAGE}:${VERSION}"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          else
            echo "version_tag=latest" >> "$GITHUB_OUTPUT"

            {
              echo "image_tags<<EOF"
              echo "${IMAGE}:latest"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ vars.GHCR_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build & push Docker image
        uses: docker/build-push-action@v6
        timeout-minutes: 30
        with:
          context: .
          push: true
          tags: ${{ steps.tags.outputs.image_tags }}
          # OCI labels surface metadata in the GHCR Packages sidebar (Source link,
          # description, version) and tie each image back to the commit it was built from.
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.description=ICICLE AI Embed Service — FastAPI + llama.cpp + Qwen3-Embedding GGUF
            org.opencontainers.image.licenses=GPL-3.0
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.tags.outputs.version_tag }}
            org.opencontainers.image.title=icicle-ai-embed-service
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke-test latest image
        run: |
          docker run --rm --entrypoint python \
            -e TAPIS_ISSUER="$TAPIS_ISSUER" \
            -e TAPIS_JWKS_URL="$TAPIS_JWKS_URL" \
            -e TAPIS_TENANT_ID="$TAPIS_TENANT_ID" \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
            -c "from src.app import auth, embedder, schemas, settings; print('all imports ok')"

      # On a v*.*.* tag push, populate the repo's "Releases" sidebar with an
      # auto-generated changelog (built from PR titles since the previous tag).
      # Skipped on regular main pushes — those only update :latest, no Release.
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          draft: false
          prerelease: false
          name: v${{ steps.tags.outputs.version_tag }}
          body: |
            Container image: `ghcr.io/${{ env.IMAGE_NAME }}:${{ steps.tags.outputs.version_tag }}`

            Image is **linux/amd64** (GitHub `ubuntu-latest` default; no cross-arch build).

  deploy-prod:
    runs-on: ubuntu-latest
    needs: [build-and-push-images]
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    # ~2 min grace + gentle health polling; a model-loading pod can take 6-7 min.
    timeout-minutes: 15

    steps:
      # The pod lives in the icicleai tenant, so the API URL is icicleai.tapis.io.
      # The token (TAPIS_TOKEN) is a long-lived service token from the TACC
      # tenant — TACC is the parent tenant in Tapis's hierarchy and is authorized
      # to manage Pods in child tenants like icicleai. URL == where the resource
      # lives; token tenant == who the caller is. They don't have to match.
      - name: Restart production Tapis pod
        timeout-minutes: 2
        uses: fjogeleit/http-request-action@v1
        with:
          url: 'https://icicleai.tapis.io/v3/pods/${{ vars.POD_ID }}/restart'
          method: 'GET'
          customHeaders: '{"Content-Type": "application/json", "X-Tapis-Token": "${{ secrets.TAPIS_TOKEN }}"}'

      # Give the pod time to be re-spun before we even start polling. After a
      # restart it sits in a creating/starting phase, and the model load in the
      # lifespan delays /healthz by minutes — so hitting it too early just errors.
      - name: Wait for pod restart
        run: sleep 120

      # Then wait gracefully instead of tight-polling: hit /healthz on a gentle
      # 20s interval and succeed as soon as it answers, but keep waiting up to
      # ~8 more minutes so a slow model load (6-7 min total) doesn't fail the
      # deploy. Early-exits the moment the pod is healthy.
      - name: Wait for production health
        timeout-minutes: 10
        run: |
          URL="${{ vars.PROD_BASE_URL }}/healthz"
          DEADLINE=$(( SECONDS + 480 ))   # ~8 min of grace after the initial sleep
          attempt=0
          until curl --fail --show-error --silent \
                  --connect-timeout 10 --max-time 15 "$URL" >/dev/null; do
            if (( SECONDS >= DEADLINE )); then
              echo "Service did not become healthy within the wait window."
              exit 1
            fi
            attempt=$(( attempt + 1 ))
            echo "Not healthy yet (attempt ${attempt}); waiting 20s ..."
            sleep 20
          done
          echo "Service healthy after ${attempt} poll(s)."